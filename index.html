
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>نوهاد ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
-webkit-tap-highlight-color:transparent;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#050505;
}

body{
position:relative;
}

/* BACKGROUND */

.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%,#ff006e55,transparent 25%),
radial-gradient(circle at 80% 20%,#8338ec55,transparent 25%),
radial-gradient(circle at 50% 90%,#ff4d6d55,transparent 25%);
animation:bg 15s infinite alternate;
}

@keyframes bg{
100%{
transform:scale(1.2);
filter:hue-rotate(90deg);
}
}

/* FLOATING NOUHAD */

.floating{
position:fixed;
inset:0;
pointer-events:none;
overflow:hidden;
}

.float-name{
position:absolute;
color:white;
font-weight:700;
opacity:.4;
text-shadow:0 0 20px hotpink;
animation:fly linear infinite;
}

@keyframes fly{
0%{
transform:translateY(120vh) rotate(0);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(-120vh) rotate(360deg);
opacity:0;
}
}

/* MAIN */

.container{
position:relative;
z-index:5;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
}

.card{
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:15px;
text-align:center;
background:rgba(255,255,255,.03);
backdrop-filter:blur(15px);
}

.crown{
font-size:28px;
margin-bottom:10px;
animation:bounce 2s infinite;
}

@keyframes bounce{
50%{
transform:translateY(-10px);
}
}

.title{
font-size:42px;
font-weight:900;
color:white;
text-shadow:
0 0 20px #ff006e,
0 0 40px #ff006e;
}

.subtitle{
margin-top:8px;
font-size:13px;
color:#ffc2d1;
}

.story{
margin-top:20px;
width:100%;
max-width:700px;
min-height:180px;
font-size:13px;
line-height:2;
color:white;
padding:0 10px;
}

.btn{
margin-top:20px;
width:95%;
max-width:320px;
height:55px;
border:none;
border-radius:999px;
background:linear-gradient(45deg,#ff006e,#ff4d88);
color:white;
font-size:14px;
font-weight:700;
cursor:pointer;
}

.final{
margin-top:15px;
font-size:12px;
color:#ffc2d1;
}

/* HEARTS */

.heart{
position:fixed;
pointer-events:none;
z-index:9999;
}

@media(max-width:768px){

.title{
font-size:34px;
}

.story{
font-size:12px;
line-height:1.9;
}

.btn{
height:52px;
font-size:13px;
}

}

</style>
</head>

<body>

<div class="bg"></div>

</div>

</div>

`من الصفات الجميلة التي أراها فيكِ أنكِ تجعلين الآخرين يشعرون بالتقدير دون أن تبذلي جهداً كبيراً. وهذه موهبة إنسانية رائعة تجعل حضوركِ محبوباً ومميزاً في أي مكان.`,

`نوهاد، عندما أتحدث عن الرقي في التعامل أتذكر أسلوبكِ الجميل. فأنتِ تملكين طريقة خاصة تجعل الحوار أكثر راحة وتجعل الكلمات تحمل دائماً شيئاً من الاحترام واللطف.`,

`كل إنسان يبحث عن أشخاص يشعر معهم بالراحة والطمأنينة، وأعتقد أن وجودكِ يمنح هذا الشعور بشكل طبيعي. ولهذا تبقى مكانتكِ جميلة ومهمة في نظر الكثيرين.`,

`هناك أشخاص نتعلم منهم الكثير دون أن يدركوا ذلك. وأشعر أنني تعلمت من طريقتكِ في التعامل مع الآخرين أهمية الاحترام والهدوء والابتسامة الصادقة في الحياة اليومية.`,

`نوهاد، مهما حاولت وصف تقديري لكِ أشعر أن الكلمات تبقى أقل من أن تعبر بشكل كامل عن القيمة الجميلة التي تمثلينها في حياة من يعرفكِ ويقدركِ.`,

`في بعض الأحيان تكفي ذكرى صغيرة أو كلمة لطيفة لتجعل اليوم أفضل. وعندما أتذكر بعض الأحاديث الجميلة بيننا أشعر دائماً أن هناك شيئاً يبعث على السعادة والامتنان.`,

`أحب الأشخاص الذين يتركون أثراً جميلاً دون تكلف، وأنتِ من هؤلاء الذين يجعلون الآخرين يتذكرونهم بالخير بسبب أخلاقهم ولطفهم وأسلوبهم الراقي في التعامل.`,

`نوهاد، وجودكِ يثبت أن الجمال الحقيقي لا يقتصر على الشكل فقط، بل يظهر أيضاً في الأخلاق والكلمات الطيبة والطريقة التي يعامل بها الإنسان من حوله.`,

`كلما مرت الأيام ازداد اقتناعي بأن الأشخاص المميزين لا يُقاسون بما يملكونه، بل بما يضيفونه إلى حياة الآخرين. وأنتِ تضيفين الكثير من الإيجابية والاحترام لكل من يعرفكِ.`,

`من الجميل أن يكون للإنسان شخص يذكره دائماً بالأشياء الجيدة في الحياة. وأشعر أن مجرد التفكير في شخصيتكِ الهادئة واللطيفة يمنحني هذا الإحساس الجميل.`,

`نوهاد، لا أعرف إن كنتِ تدركين مقدار التأثير الجميل الذي تتركينه في قلوب الآخرين، لكنني متأكد أن حضوركِ يجعل الكثير من اللحظات أكثر دفئاً وإشراقاً.`,

`هناك أسماء تمر في الحياة مروراً عادياً، وهناك أسماء تبقى مرتبطة بمشاعر جميلة مهما مر الزمن. واسمكِ بالنسبة لي من الأسماء التي تحمل دائماً معنى الاحترام والتقدير.`,

`كل حديث جميل وكل ذكرى لطيفة وكل لحظة مريحة تجعلني أقدّر وجودكِ أكثر. لأنكِ ببساطة شخص يملك القدرة على إضافة قيمة حقيقية إلى التفاصيل الصغيرة.`,

`نوهاد، عندما أرى شخصاً يجمع بين الطيبة والذكاء والاحترام أشعر بالإعجاب. ولهذا أجد أن شخصيتكِ تحمل الكثير من الصفات التي تجعلها مميزة ومحبوبة.`,

`أحياناً لا يحتاج الإنسان إلى سبب محدد ليشعر بالامتنان تجاه شخص ما. يكفي أن يكون وجود ذلك الشخص مرتبطاً بالكثير من المشاعر الجميلة والذكريات الطيبة.`,

`من الأشياء التي تجعلني أقدركِ أنكِ تحافظين على أسلوبكِ الجميل مهما كانت الظروف. وهذا يعكس شخصية قوية ومتوازنة تستحق كل احترام وتقدير.`,

`نوهاد، عندما أتأمل صفات الأشخاص الذين أعتبرهم مميزين أجد أن كثيراً من تلك الصفات موجودة فيكِ. ولهذا تبقى مكانتكِ مختلفة وقريبة إلى القلب دائماً.`,

`كل يوم يمر يجعلني أؤمن أكثر أن الأشخاص الطيبين هم الثروة الحقيقية في الحياة. وأنتِ مثال جميل على هذا النوع من الأشخاص الذين يجعلون العالم ألطف وأجمل.`,

`هناك شعور خاص يرافقني عندما أتذكر حديثاً جميلاً بيننا، وكأن تلك الكلمات ما زالت تحمل نفس الدفء والراحة حتى بعد مرور الوقت.`,

`نوهاد، أكثر ما يعجبني فيكِ أنكِ لا تحاولين أن تكوني مميزة، ومع ذلك تبقين مختلفة عن الجميع بطريقة طبيعية وجميلة تجعل الآخرين يقدرونكِ كثيراً.`,

`كلما تحدثت معكِ أشعر أن الوقت يمر بسرعة أكبر، ليس لأن الحديث طويل، بل لأن أسلوبكِ يجعل الحوار ممتعاً وخفيفاً ومليئاً بالطاقة الإيجابية.`,

`من الرائع أن يعرف الإنسان شخصاً يستطيع أن يذكره دائماً بكل خير. وأنتِ من الأشخاص الذين يسهل الحديث عنهم باحترام وإعجاب بسبب أخلاقهم الجميلة.`,

`نوهاد، مهما اختلفت الأيام تبقى بعض الشخصيات ثابتة في مكانتها داخل القلوب. وأشعر أن لطفكِ واحترامكِ يجعلان لكِ هذه المكانة الجميلة عند الكثيرين.`,

`هناك لحظات عادية تصبح مميزة فقط بسبب الأشخاص الموجودين فيها. ولهذا أعتقد أن جزءاً كبيراً من جمال بعض الذكريات يعود إلى وجودكِ فيها.`,

`كل إنسان يحتاج إلى أشخاص يشعرونَه بأنه محل تقدير واحترام. وأنتِ تملكين قدرة جميلة على منح هذا الشعور للآخرين بطريقة صادقة وبسيطة.`,

`نوهاد، إذا كان للطيبة عنوان فإن الكثير من تصرفاتكِ وكلماتكِ تعكس هذا المعنى الجميل. ولهذا أرى أن معرفتكِ من الأمور التي تستحق الامتنان حقاً.`
];


/* =======================================
TYPEWRITER
======================================= */

const story =
document.getElementById("story");

const btn =
document.getElementById("btn");

let current = 0;
let typing = false;

function typeWriter(text){

typing = true;

story.innerHTML = "";

let i = 0;

function write(){

if(i < text.length){

story.innerHTML +=
text.charAt(i);

i++;

setTimeout(write,20);

}else{

typing = false;

}

}

write();

}

if(messages.length){
typeWriter(messages[0]);
}

/* =======================================
BUTTON
======================================= */

btn.addEventListener("click",()=>{

if(typing) return;

current++;

if(current >= messages.length){
current = 0;
}

typeWriter(messages[current]);

explodeHearts();

});

/* =======================================
HEARTS
======================================= */

function explodeHearts(){

for(let i=0;i<60;i++){

const heart =
document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left="50vw";
heart.style.top="50vh";

heart.style.fontSize=
(Math.random()*20+10)+"px";

document.body.appendChild(heart);

const x=
(Math.random()-0.5)*900;

const y=
(Math.random()-0.5)*900;

heart.animate([
{
transform:"translate(0,0)",
opacity:1
},
{
transform:
`translate(${x}px,${y}px)`,
opacity:0
}
],{
duration:2500
});

setTimeout(()=>{
heart.remove();
},2500);

}

}

</script>
