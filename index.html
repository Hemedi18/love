<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wewe Ni Wangu 💖</title>
    <!-- Tailwind for rapid UI styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts for romantic typography -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Great+Vibes&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <!-- Three.js for 3D Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            background-color: #000; /* Fallback */
        }

        /* The beautiful provided image as a blurred background */
        .bg-image-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://lh3.googleusercontent.com/d/1B0aO6N0HwK7zM6W2A3Hl4W1E7W8gTqE_');
            background-size: cover;
            background-position: center;
            filter: blur(8px) brightness(0.6);
            z-index: 0;
            transform: scale(1.1); /* Prevent blurred edges showing white */
        }

        /* 3D Canvas Container */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none; /* Let clicks pass through to UI */
        }

        /* Glowing overlay for that romantic sunset feel */
        .glow-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(255, 165, 0, 0.2) 0%, rgba(0, 0, 0, 0.6) 100%);
            z-index: 2;
            pointer-events: none;
        }

        /* Main UI Container - Glassmorphism */
        .ui-container {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            box-shadow: 0 8px 32px 0 rgba(255, 105, 135, 0.3);
            padding: 40px 30px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            transition: all 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            transform: scale(0.9);
            opacity: 0;
        }

        .glass-card.visible {
            transform: scale(1);
            opacity: 1;
        }

        /* Typography */
        .title-text {
            font-family: 'Great Vibes', cursive;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 0 0 20px #ff6b81, 0 0 30px #ff4757;
            font-size: 4rem;
            margin-bottom: 10px;
            line-height: 1.2;
        }

        .subtitle-text {
            font-family: 'Montserrat', sans-serif;
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.1rem;
            font-weight: 300;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        /* Interactive Elements */
        .btn-love {
            background: linear-gradient(45deg, #ff4757, #ff6b81);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 71, 87, 0.4);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
        }

        .btn-love::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s ease;
        }

        .btn-love:hover::before {
            left: 100%;
        }

        .btn-love:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 25px rgba(255, 71, 87, 0.6);
        }

        .btn-dodge {
            position: absolute;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 10px 20px;
            border-radius: 50px;
            transition: all 0.3s ease;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        /* Typewriter text for phase 2 */
        .deep-message {
            font-family: 'Dancing Script', cursive;
            font-size: 2rem;
            color: #fff;
            line-height: 1.5;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
            min-height: 150px;
            display: none;
        }

        .cursor {
            display: inline-block;
            width: 3px;
            height: 1.5em;
            background-color: #ff6b81;
            animation: blink 1s step-end infinite;
            vertical-align: text-bottom;
            margin-left: 5px;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* Floating 2D Hearts for extra effect */
        .floating-heart-2d {
            position: absolute;
            pointer-events: none;
            z-index: 5;
            animation: floatUp 4s ease-in infinite;
            opacity: 0;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            20% { opacity: 0.8; }
            80% { opacity: 0.8; }
            100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
        }

        /* Image Display in Phase 2 */
        .reveal-image {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid rgba(255,255,255,0.8);
            box-shadow: 0 0 30px rgba(255, 107, 129, 0.8);
            margin: 0 auto 20px auto;
            display: none;
            opacity: 0;
            transform: scale(0.5);
            transition: all 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background-image: url('https://lh3.googleusercontent.com/d/1B0aO6N0HwK7zM6W2A3Hl4W1E7W8gTqE_');
            background-size: cover;
            background-position: center;
        }

        .reveal-image.show {
            display: block;
            opacity: 1;
            transform: scale(1);
        }
                /* MULHAT ANIMATION */

        .mulhat-container{
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 5;
        }

        .mulhat-center{
            position: absolute;
            top:50%;
            left:50%;
            transform:translate(-50%,-50%);
            font-size: clamp(2rem,8vw,5rem);
            font-family:'Fredoka One', cursive;
            color:#ff0a54;
            text-shadow:
                0 0 10px #ff477e,
                0 0 20px #ff477e,
                0 0 40px #ff477e;
            animation:
                pulseCenter 2s infinite ease-in-out;
        }

        .mulhat-orbit{
            position:absolute;
            top:50%;
            left:50%;
            width:10px;
            height:10px;
        }

        .mulhat-orbit span{
            position:absolute;
            font-weight:bold;
            font-family:'Fredoka One', cursive;
            color:#ff477e;
            white-space:nowrap;
            text-shadow:0 0 15px rgba(255,71,126,.9);
        }

        /* Orbit 1 */
        .orbit1{
            animation:orbit360 8s linear infinite;
        }
        .orbit1 span{
            transform:translateX(35vw);
            font-size:clamp(1rem,4vw,2rem);
        }

        /* Orbit 2 */
        .orbit2{
            animation:orbit360 12s linear infinite reverse;
        }
        .orbit2 span{
            transform:translateX(25vw);
            font-size:clamp(1rem,3vw,1.8rem);
        }

        /* Orbit 3 */
        .orbit3{
            animation:orbit360 6s linear infinite;
        }
        .orbit3 span{
            transform:translateX(45vw);
            font-size:clamp(1.2rem,4vw,2.2rem);
        }

        /* Orbit 4 */
        .orbit4{
            animation:orbit360 15s linear infinite reverse;
        }
        .orbit4 span{
            transform:translateX(55vw);
            font-size:clamp(1rem,3vw,1.7rem);
        }

        @keyframes orbit360{
            from{
                transform:translate(-50%,-50%) rotate(0deg);
            }
            to{
                transform:translate(-50%,-50%) rotate(360deg);
            }
        }

        @keyframes pulseCenter{
            0%,100%{
                transform:translate(-50%,-50%) scale(1);
            }
            50%{
                transform:translate(-50%,-50%) scale(1.2);
            }
        }

        /* Mobile optimization */
        @media(max-width:768px){

            .orbit1 span{
                transform:translateX(38vw);
            }

            .orbit2 span{
                transform:translateX(28vw);
            }

            .orbit3 span{
                transform:translateX(48vw);
            }

            .orbit4 span{
                transform:translateX(58vw);
            }

            .mulhat-center{
                font-size:3rem;
            }
        }
        .mulhat-orbit span{
    animation:
        rainbowGlow 1s infinite alternate,
        bounceName 2s infinite ease-in-out;
    }

    @keyframes rainbowGlow{
        0%{color:#ff0a54;}
        25%{color:#ff477e;}
        50%{color:#ff85a1;}
        75%{color:#ff006e;}
        100%{color:#ff0a54;}
    }

    @keyframes bounceName{
        0%,100%{transform:translateX(35vw) scale(1);}
        50%{transform:translateX(35vw) scale(1.4);}
    }

    </style>
</head>
<body>

    <!-- Backgrounds -->
    <div class="bg-image-container"></div>
    <div class="glow-overlay"></div>
    <div id="canvas-container"></div>

    <!-- UI Interaction Layer -->
    <div class="ui-container">
        
        <!-- Phase 1: The Question -->
        <div id="phase1" class="glass-card">
            <h1 class="title-text">Malkia Wangu</h1>
            <p class="subtitle-text">Nina swali moja dogo lakini muhimu sana...</p>
            <h2 class="text-2xl font-bold text-white mb-8">Je, unajua wewe ni kila kitu kwangu?</h2>
            
            <div class="relative h-40 w-full flex justify-center items-center">
                <button id="btnYes" class="btn-love z-20 absolute">Ndiyo, Najua! 💖</button>
                <button id="btnNo" class="btn-dodge z-10" style="left: 60%; top: 60%;">Hapana</button>
            </div>
        </div>

        <!-- Phase 2: The Romantic Reveal -->
        <div id="phase2" class="glass-card">
            <div id="revealedImg" class="reveal-image"></div>
            <div id="deepMessageContainer" class="deep-message">
                <span id="typewriterText"></span><span class="cursor"></span>
            </div>
        </div>

    </div>
    <!-- Floating Spinning Name -->
    <div class="mulhat-container">
        <div class="mulhat-orbit orbit1">
            <span>MULHAT 💖</span>
        </div>

        <div class="mulhat-orbit orbit2">
            <span>MULHAT 💕</span>
        </div>

        <div class="mulhat-orbit orbit3">
            <span>MULHAT 😍</span>
        </div>

        <div class="mulhat-orbit orbit4">
            <span>MULHAT ❤️</span>
        </div>

        <div class="mulhat-center">
            MULHAT 👑
        </div>
    </div>

    <script>
        // --- 1. THREE.JS 3D BACKGROUND ANIMATIONS ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        // Camera setup
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 30;

        // Renderer setup
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        
        const pointLight = new THREE.PointLight(0xff6b81, 2, 100);
        pointLight.position.set(0, 0, 20);
        scene.add(pointLight);

        // Create 3D Heart Shape Geometry
        function createHeartGeometry() {
            const shape = new THREE.Shape();
            const x = 0, y = 0;
            shape.moveTo(x + 2.5, y + 2.5);
            shape.bezierCurveTo(x + 2.5, y + 2.5, x + 2.0, y, x, y);
            shape.bezierCurveTo(x - 3.0, y, x - 3.0, y + 3.5, x - 3.0, y + 3.5);
            shape.bezierCurveTo(x - 3.0, y + 5.5, x - 1.0, y + 7.7, x + 2.5, y + 9.5);
            shape.bezierCurveTo(x + 6.0, y + 7.7, x + 8.0, y + 5.5, x + 8.0, y + 3.5);
            shape.bezierCurveTo(x + 8.0, y + 3.5, x + 8.0, y, x + 5.0, y);
            shape.bezierCurveTo(x + 3.5, y, x + 2.5, y + 2.5, x + 2.5, y + 2.5);

            const extrudeSettings = { depth: 1, bevelEnabled: true, bevelSegments: 2, steps: 2, bevelSize: 0.5, bevelThickness: 0.5 };
            const geometry = new THREE.ExtrudeGeometry(shape, extrudeSettings);
            
            // Center the geometry
            geometry.computeBoundingBox();
            const box = geometry.boundingBox;
            const center = new THREE.Vector3();
            box.getCenter(center);
            geometry.translate(-center.x, -center.y, -center.z);
            
            // Scale it down
            geometry.scale(0.15, 0.15, 0.15);
            return geometry;
        }

        const heartGeometry = createHeartGeometry();
        
        // Materials with romantic colors
        const materials = [
            new THREE.MeshPhongMaterial({ color: 0xff4757, shininess: 100 }), // Red
            new THREE.MeshPhongMaterial({ color: 0xff6b81, shininess: 80 }),  // Pink
            new THREE.MeshPhongMaterial({ color: 0xffa502, shininess: 50 }),  // Orange-gold (matches sunset)
            new THREE.MeshPhongMaterial({ color: 0xffffff, shininess: 120, transparent: true, opacity: 0.7 }) // Glassy white
        ];

        // Create an array to hold all heart meshes
        const hearts = [];
        const numHearts = window.innerWidth < 768 ? 40 : 80; // Responsive amount

        for (let i = 0; i < numHearts; i++) {
            const material = materials[Math.floor(Math.random() * materials.length)];
            const mesh = new THREE.Mesh(heartGeometry, material);
            
            // Random positions spread across screen
            mesh.position.x = (Math.random() - 0.5) * 60;
            mesh.position.y = (Math.random() - 0.5) * 40;
            mesh.position.z = (Math.random() - 0.5) * 40 - 10; // -10 to -50 range
            
            // Random rotations
            mesh.rotation.x = Math.random() * Math.PI;
            mesh.rotation.y = Math.random() * Math.PI;
            
            // Custom properties for animation
            mesh.userData = {
                rotSpeedX: (Math.random() - 0.5) * 0.05,
                rotSpeedY: (Math.random() - 0.5) * 0.05,
                floatSpeed: Math.random() * 0.05 + 0.02,
                originalY: mesh.position.y
            };
            
            scene.add(mesh);
            hearts.push(mesh);
        }

        // Add Floating Sparks (Particles)
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 500;
        const posArray = new Float32Array(particlesCount * 3);
        
        for(let i = 0; i < particlesCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 80;
        }
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const particlesMaterial = new THREE.PointsMaterial({
            size: 0.15,
            color: 0xffd32a, // Gold sparks
            transparent: true,
            opacity: 0.6,
            blending: THREE.AdditiveBlending
        });
        const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particlesMesh);

        // Interaction state
        let isSpeedUp = false;

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);

            // Animate Hearts
            hearts.forEach(heart => {
                // Spinning
                const speedMult = isSpeedUp ? 5 : 1;
                heart.rotation.x += heart.userData.rotSpeedX * speedMult;
                heart.rotation.y += heart.userData.rotSpeedY * speedMult;
                
                // Floating up slowly
                heart.position.y += heart.userData.floatSpeed * (isSpeedUp ? 3 : 1);
                
                // Reset position if it goes too high
                if (heart.position.y > 25) {
                    heart.position.y = -25;
                    heart.position.x = (Math.random() - 0.5) * 60;
                }
            });

            // Animate Sparks
            particlesMesh.rotation.y += 0.001;
            particlesMesh.position.y += isSpeedUp ? 0.05 : 0.01;
            if(particlesMesh.position.y > 20) particlesMesh.position.y = -20;

            renderer.render(scene, camera);
        }

        // Handle Window Resize for 3D Canvas
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start 3D Animation
        window.onload = () => {
            animate();
            // Entrance animation for the UI card
            setTimeout(() => {
                document.getElementById('phase1').classList.add('visible');
            }, 500);
        };

        // --- 2. DODGING "NO" BUTTON LOGIC ---
        const btnNo = document.getElementById('btnNo');
        const phase1Card = document.getElementById('phase1');
        
        const funnyNoTexts = [
            "Huwezi 😂", "Uongo!", "Nibonyeze basi!", "Njoo huku", "Wapi!", "Mimi ni wako tu"
        ];
        let textIndex = 0;

        function dodge() {
            btnNo.innerText = funnyNoTexts[textIndex % funnyNoTexts.length];
            textIndex++;
            
            // Calculate random safe position within the card container
            const rect = phase1Card.getBoundingClientRect();
            const btnRect = btnNo.getBoundingClientRect();
            
            // Keep button within relative container bounds
            const maxX = rect.width - btnRect.width - 40;
            const maxY = 150; // Constrain to bottom half roughly
            
            const randomX = Math.max(10, Math.floor(Math.random() * maxX));
            const randomY = Math.max(10, Math.floor(Math.random() * maxY));

            btnNo.style.left = randomX + 'px';
            btnNo.style.top = randomY + 'px';
        }

        btnNo.addEventListener('mouseover', dodge);
        btnNo.addEventListener('touchstart', (e) => {
            e.preventDefault();
            dodge();
        });

        // --- 3. YES BUTTON & ROMANTIC REVEAL ---
        const btnYes = document.getElementById('btnYes');
        const phase1 = document.getElementById('phase1');
        const phase2 = document.getElementById('phase2');
        const deepMessageContainer = document.getElementById('deepMessageContainer');
        const typewriterText = document.getElementById('typewriterText');
        const revealedImg = document.getElementById('revealedImg');

        const finalMessage = "Nilijua tu... 😍\nKatikati ya wasichana mabilioni hapa duniani, macho yangu yanaona wewe tu. Uwepo wako ni faraja ya moyo wangu, na tabasamu lako ni nuru ya siku zangu. Wewe ni malkia wangu, mpenzi wangu, na rafiki yangu wa milele. Nakupenda sana kuliko unavyoweza kufikiria. ❤️";

        btnYes.addEventListener('click', () => {
            // Speed up 3D animation temporarily for excitement
            isSpeedUp = true;
            create2DHeartsBurst(); // Extra visual explosion

            // Hide Phase 1
            phase1.style.opacity = '0';
            phase1.style.transform = 'scale(0.8)';
            
            setTimeout(() => {
                phase1.style.display = 'none';
                phase2.style.display = 'block';
                
                // Show Phase 2
                setTimeout(() => {
                    phase2.classList.add('visible');
                    revealedImg.classList.add('show');
                    
                    // Start Typewriter
                    setTimeout(() => {
                        deepMessageContainer.style.display = 'block';
                        isSpeedUp = false; // Slow down animation back to romantic pace
                        typeWriter(finalMessage, 0);
                    }, 1000);
                }, 100);
            }, 800);
        });

        // Typewriter Effect
        function typeWriter(text, i) {
            if (i < text.length) {
                if (text.charAt(i) === '\n') {
                    typewriterText.innerHTML += '<br><br>';
                } else {
                    typewriterText.innerHTML += text.charAt(i);
                }
                
                let speed = 60; // Base speed
                if(text.charAt(i) === '.' || text.charAt(i) === ',') speed = 300; // Pause at punctuation
                
                setTimeout(() => typeWriter(text, i + 1), speed);
            } else {
                document.querySelector('.cursor').style.animation = 'none'; // Stop blinking
                document.querySelector('.cursor').style.opacity = '0';
            }
        }

        // --- 4. 2D HEARTS BURST (EXTRA INTERACTIVITY) ---
        function create2DHeartsBurst() {
            for(let i=0; i<30; i++) {
                setTimeout(() => {
                    const h = document.createElement('div');
                    h.innerHTML = '💖';
                    h.className = 'floating-heart-2d';
                    h.style.left = Math.random() * window.innerWidth + 'px';
                    h.style.top = window.innerHeight + 'px';
                    h.style.fontSize = (Math.random() * 30 + 20) + 'px';
                    h.style.animationDuration = (Math.random() * 2 + 3) + 's';
                    document.body.appendChild(h);
                    
                    // Clean up
                    setTimeout(() => h.remove(), 5000);
                }, i * 50);
            }
        }

        // Create hearts on click anywhere
        document.addEventListener('click', (e) => {
            if(e.target.tagName === 'BUTTON') return; // Don't interfere with buttons
            
            const h = document.createElement('div');
            h.innerHTML = ['✨','💖','💕','🥰'][Math.floor(Math.random()*4)];
            h.className = 'floating-heart-2d';
            h.style.left = (e.clientX - 15) + 'px';
            h.style.top = (e.clientY - 15) + 'px';
            h.style.fontSize = '30px';
            h.style.animation = 'floatUp 2s ease-out forwards';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 2000);
        });

    </script>
</body>
</html>
