<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Mulhat ❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="particles"></div>

<div id="cursor-heart"></div>

<div class="floating-name">
    <span>MULHAT ❤️</span>
</div>

<div class="floating-name second">
    <span>MULHAT 👑</span>
</div>

<div class="floating-name third">
    <span>MULHAT 💖</span>
</div>

<section class="hero">

    <div class="glass-card">

        <div class="emoji">🥺💖</div>

        <h1>MULHAT</h1>

        <h2>Malkia wa Moyo Wangu</h2>

        <p>
            Katika dunia yenye watu wengi,
            moyo wangu huchagua wewe kila siku.
            Wewe ni tabasamu langu,
            furaha yangu,
            na sababu ya moyo wangu kupiga kwa nguvu zaidi.
        </p>

        <button id="loveBtn">
            Bonyeza Hapa ❤️
        </button>

        <div id="messageBox"></div>

    </div>

</section>

<script src="app.js"></script>

</body>
</html>
